<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THOUGHT</title>
</head>

<body class="frontpage">
  <link rel="stylesheet" href="/src/style.css">

  <main class="frontpage-shell">
    <section class="frontpage-stage" aria-labelledby="frontpage-title">
      <h1 id="frontpage-title" class="frontpage-title">THOUGHT</h1>

      <div class="thought-canvas-frame">
        <canvas
          id="thought-grid"
          class="thought-grid"
          width="960"
          height="540"
          aria-label="Canvas preview of the current character squares"
        ></canvas>
      </div>

      <div class="frontpage-input-panel">
        <label class="frontpage-label" for="input-box">Input</label>
        <input
          id="input-box"
          class="frontpage-input"
          type="text"
          inputmode="text"
          autocomplete="off"
          autocapitalize="characters"
          spellcheck="false"
          placeholder="Type English letters only"
        />
        <div id="input-warning" class="frontpage-warning" role="alert" aria-live="polite"></div>
        <p class="frontpage-note">Allowed: A-Z and spaces. Rendering updates as you type.</p>
      </div>

      <section class="color-font-panel" aria-labelledby="color-font-title">
        <div class="color-font-header">
          <p class="frontpage-label">Color Font</p>
          <h2 id="color-font-title" class="color-font-title">Fixed letter to color mapping</h2>
        </div>
        <div id="color-font-legend" class="color-font-legend" aria-label="Color font legend"></div>
      </section>
    </section>
  </main>

  <script type="module" src="/src/main.ts"></script>
</body>

</html>
